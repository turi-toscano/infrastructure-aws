---
- name: Configure control plane
  hosts: control_plane
  become: true

  vars:
    kubeconfig_path: /home/ubuntu/.kube/config

  tasks:
    - name: Wait for cloud-init to finish
      command: cloud-init status --wait
      register: cloudinit
      changed_when: false
      failed_when: cloudinit.rc not in [0, 2]

    - name: Check if control plane is already initialsed
      stat:
        path: /etc/kubernetes/admin.conf
      register: kubeadm_done

    - name: kubeadm init
      command: >
        kubeadm init
        --pod-network-cidr={{ pod_network_cidr }}
        --apiserver-cert-extra-sans=127.0.0.1
      when: not kubeadm_done.stat.exists

    - name: Create .kube directory for ubuntu user
      file:
        path: /home/ubuntu/.kube
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    - name: Copy admin.conf to ubuntu's kubeconfig
      copy:
        src: /etc/kubernetes/admin.conf
        dest: "{{ kubeconfig_path }}"
        remote_src: true
        owner: ubuntu
        group: ubuntu
        mode: "0600"

    - name: Install Helm
      shell: curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm
    
    - name: Install Flannel CNI
      command: >
        helm upgrade --install flannel flannel
        --repo https://flannel-io.github.io/flannel
        --namespace kube-flannel --create-namespace
        --set podCidr={{ pod_network_cidr }}
        --set image.repository=flannel/flannel
        --set image.tag=v0.28.4
        --set initImage.repository=flannel/flannel-cni-plugin
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Wait for control plane to be ready
      become: false
      shell: kubectl get nodes --no-headers | grep -cw Ready || true
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: cp_ready
      until: cp_ready.stdout | int >= 1
      retries: 20
      delay: 15
      changed_when: false

    - name: Generate join command for workers
      command: kubeadm token create --ttl 0 --print-join-command
      register: join_command
      changed_when: false
      no_log: true

    - name: Publish join command to SSM Parameter Store
      delegate_to: localhost
      become: false
      shell: >
        aws ssm put-parameter
        --name "{{ ssm_join_command_path }}"
        --value "{{ join_command.stdout }}"
        --type SecureString
        --overwrite
        --region {{ aws_region }}
      changed_when: true

    - name: Wait for all workers to join and be ready
      become: false
      shell: kubectl get nodes --no-headers | grep -cw Ready || true
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: nodes_ready
      until: nodes_ready.stdout | int >= (expected_workers | int) + 1
      retries: 40
      delay: 30
      changed_when: false

    - name: Install metrics-server
      command: >
        helm upgrade --install metrics-server metrics-server
        --repo https://kubernetes-sigs.github.io/metrics-server
        --namespace kube-system
        --set 'args={--kubelet-insecure-tls}'
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Wait for metrics-server rollout
      command: kubectl rollout status deployment/metrics-server -n kube-system --timeout=120s
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Install ingress-nginx
      command: >
        helm upgrade --install ingress-nginx ingress-nginx
        --repo https://kubernetes.github.io/ingress-nginx
        --namespace ingress-nginx --create-namespace
        --set controller.service.type=NodePort
        --set controller.service.nodePorts.http={{ ingress_node_port }}
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Wait for ingress-nginx rollout
      become: false
      command: kubectl rollout status deployment/ingress-nginx-controller -n ingress-nginx --timeout=120s
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      changed_when: false

    - name: Fetch kubeconfig
      fetch:
        src: "{{ kubeconfig_path }}"
        dest: ./kubeconfig
        flat: true

    - name: Publish kubeconfig to SSM Parameter Store
      delegate_to: localhost
      become: false
      shell: >
        aws ssm put-parameter
        --name "{{ ssm_kubeconfig_path }}"
        --value "$(cat kubeconfig)"
        --type SecureString
        --tier Advanced
        --overwrite
        --region {{ aws_region }}
      changed_when: true
      no_log: true
